---
name: Update nixpkgs-lock pin

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31

      - run: nix flake update nixpkgs-lock

      - run: nix flake check --no-build

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: "chore: update nixpkgs-lock pin"
          title: "chore: update nixpkgs-lock pin"
          branch: auto/pin-update
          delete-branch: true
          labels: auto-merge
          author: Marcin Nowicki <pr0d1r2@gmail.com>
          committer: Marcin Nowicki <pr0d1r2@gmail.com>
